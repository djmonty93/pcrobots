services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    environment:
      PORT: 3000
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgres://pcrobots:pcrobots@postgres:5432/pcrobots
      REDIS_URL: redis://redis:6379
      PCROBOTS_RUNNERS_DIR: /app/runners
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    environment:
      DATABASE_URL: postgres://pcrobots:pcrobots@postgres:5432/pcrobots
      REDIS_URL: redis://redis:6379
      PCROBOTS_RUNNERS_DIR: /app/runners
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pcrobots
      POSTGRES_USER: pcrobots
      POSTGRES_PASSWORD: pcrobots
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcrobots -d pcrobots"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  postgres-data:
  redis-data:
